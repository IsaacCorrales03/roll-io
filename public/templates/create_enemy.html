{% extends "base.html" %}

{% block title %}Crear Enemigo - Chronicle20{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/create_enemy.css') }}">
{% endblock %}

{% block content %}
<section class="min-h-screen py-12 px-4">
    <div class="max-w-7xl mx-auto">
        <div class="relative">
            <div class="absolute -inset-1 bg-gradient-to-r from-red-500/20 to-pink-500/20 rounded-2xl blur"></div>
            <div class="relative bg-slate-800/50 border border-slate-700/50 rounded-2xl backdrop-blur-sm overflow-hidden">

                <!-- Tab Navigation -->
                <div class="flex border-b border-slate-700/50">
                    <button type="button" onclick="switchTab('info')"
                        class="tab-button active" data-tab="info">Información</button>
                    <button type="button" onclick="switchTab('attributes')"
                        class="tab-button" data-tab="attributes">Atributos</button>
                    <button type="button" onclick="switchTab('attacks')"
                        class="tab-button" data-tab="attacks">Ataques</button>
                    <button type="button" onclick="switchTab('preview')"
                        class="tab-button" data-tab="preview">Preview</button>
                </div>

                <!-- Tab Content -->
                <div class="p-8">

                    <!-- Tab 1: Información -->
                    <div id="tab-info" class="tab-content active space-y-6">
                        <div>
                            <label for="enemy-name">Nombre del Enemigo</label>
                            <input type="text" id="enemy-name" placeholder="Ingresa un nombre..." required>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <div>
                                <label>HP</label>
                                <input type="number" id="enemy-hp" placeholder="HP">
                            </div>
                            <div>
                                <label>HP Máximo</label>
                                <input type="number" id="enemy-max-hp" placeholder="HP Máximo">
                            </div>
                            <div>
                                <label>Clase de Armadura</label>
                                <input type="number" id="enemy-ac" placeholder="AC">
                            </div>
                        </div>
                        <div>
                            <label>Tamaño</label>
                            <select id="enemy-size">
                                <option value="1x1">1×1</option>
                                <option value="1x2">1×2</option>
                                <option value="2x2">2×2</option>
                                <option value="3x3">3×3</option>
                            </select>
                        </div>
                        <div>
                            <label>Asset (imagen)</label>
                            <input type="file" id="enemy-asset" accept="image/*">
                        </div>
                    </div>

                    <!-- Tab 2: Atributos — FIXED: added tab-content class -->
                    <div id="tab-attributes" class="tab-content grid grid-cols-3 gap-4">
                        <div><label>FUE</label><input type="number" id="enemy-str" value="10" class="attribute-input"></div>
                        <div><label>DES</label><input type="number" id="enemy-dex" value="10" class="attribute-input"></div>
                        <div><label>CON</label><input type="number" id="enemy-con" value="10" class="attribute-input"></div>
                        <div><label>INT</label><input type="number" id="enemy-int" value="10" class="attribute-input"></div>
                        <div><label>SAB</label><input type="number" id="enemy-wis" value="10" class="attribute-input"></div>
                        <div><label>CAR</label><input type="number" id="enemy-cha" value="10" class="attribute-input"></div>
                        <!-- Radar Chart -->
                        <div id="radar-chart-container" style="grid-column: 1/-1; margin-top: 1rem;"></div>
                    </div>

                    <!-- Tab 3: Ataques -->
                    <div id="tab-attacks" class="tab-content space-y-4">
                        <h3 class="text-lg font-bold" style="font-family:'Cinzel',serif; color: var(--gold-pale, #e8c87a);">Ataques</h3>
                        <div id="attacks-container" class="space-y-2"></div>
                        <button type="button" onclick="addAttack()">+ Añadir Ataque</button>
                    </div>

                    <!-- Tab 4: Preview -->
                    <div id="tab-preview" class="tab-content text-center">
                        <h3 class="text-lg font-bold mb-4" style="font-family:'Cinzel',serif; color: var(--gold-pale, #e8c87a);">Preview del Enemigo</h3>
                        <!-- FIXED: static div that JS fills instead of creating a new element -->
                        <div id="enemy-preview"></div>
                        <p class="text-slate-400 mt-2 text-sm">El token aparecerá aquí al subir una imagen.</p>
                        <button onclick="createEnemy()">⚔ Invocar al Campo</button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
    function switchTab(tabName) {
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
        const tab = document.getElementById(`tab-${tabName}`);
        tab.classList.add('active');
        // restore grid display for attributes tab
        if (tabName === 'attributes') tab.style.display = 'grid';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
<script src="{{ url_for('static', filename='js/create_enemy.js') }}"></script>
{% endblock %}
